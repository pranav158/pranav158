<svg class="banner-root" viewBox="0 0 1150 250" width="100%" height="auto" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
  <title id="title">Mystic Profile Header Banner</title>
  <desc id="desc">Animated premium cosmic cyberpunk header for Mystic profile with custom logo, HUD rings, perspective grids, and smooth alpha waves</desc>

  <style>
    :root {
      color-scheme: dark;
    }
    .banner-root {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
    }
    .star {
      animation: twinkle 4s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.85; }
    }
    .logo-pulse {
      animation: pulse 4.5s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.96); filter: drop-shadow(0 0 4px rgba(124, 58, 237, 0.4)); }
      50% { transform: scale(1.04); filter: drop-shadow(0 0 12px rgba(124, 58, 237, 0.8)); }
    }
    .hud-glow {
      filter: drop-shadow(0 0 3px rgba(14, 165, 233, 0.3));
    }
    .text-glow {
      filter: drop-shadow(0 0 2px rgba(124, 58, 237, 0.3));
    }
    @media (prefers-reduced-motion: reduce) {
      .star, .logo-pulse, .hud-rotate-cw, .hud-rotate-ccw, .comet {
        animation: none !important;
        transform: none !important;
      }
    }
  </style>

  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#030008" />
      <stop offset="50%" stop-color="#0a041a" />
      <stop offset="100%" stop-color="#020005" />
    </linearGradient>

    <radialGradient id="nebulaPurple" cx="25%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="nebulaCyan" cx="75%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>

    <!-- Border & Wave Gradients -->
    <linearGradient id="borderGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="50%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <linearGradient id="titleGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#e9d5ff" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Front Wave Alpha Fade (masks bottom grid elements and transitions smoothly to transparent) -->
    <linearGradient id="frontWaveFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080416" stop-opacity="0.95" />
      <stop offset="50%" stop-color="#05020c" stop-opacity="0.50" />
      <stop offset="100%" stop-color="#030107" stop-opacity="0.00" />
    </linearGradient>

    <!-- Comet Gradient -->
    <linearGradient id="cometGradient" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0" />
      <stop offset="70%" stop-color="#0ea5e9" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.0" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND CARD -->
  <!-- Base cosmic background -->
  <rect width="1150" height="160" fill="url(#bgGradient)" />
  <rect width="1150" height="160" fill="url(#nebulaPurple)" />
  <rect width="1150" height="160" fill="url(#nebulaCyan)" />

  <!-- Twinkling Starfield -->
  <g fill="#ffffff">
    <circle class="star" cx="120" cy="35" r="1.2" style="animation-delay: 0.2s; animation-duration: 3.5s;" />
    <circle class="star" cx="240" cy="20" r="1.5" style="animation-delay: 1.1s; animation-duration: 4.2s;" />
    <circle class="star" cx="450" cy="45" r="1.0" style="animation-delay: 2.3s; animation-duration: 2.8s;" />
    <circle class="star" cx="620" cy="15" r="1.8" style="animation-delay: 0.5s; animation-duration: 5.0s;" />
    <circle class="star" cx="780" cy="40" r="1.3" style="animation-delay: 1.7s; animation-duration: 3.1s;" />
    <circle class="star" cx="950" cy="25" r="1.6" style="animation-delay: 3.0s; animation-duration: 4.5s;" />
    <circle class="star" cx="1080" cy="30" r="1.1" style="animation-delay: 0.8s; animation-duration: 3.9s;" />
    <circle class="star" cx="330" cy="10" r="1.4" style="animation-delay: 1.5s; animation-duration: 4.8s;" />
    <circle class="star" cx="870" cy="10" r="1.2" style="animation-delay: 2.7s; animation-duration: 3.4s;" />
  </g>

  <!-- Shooting Stars / Comets -->
  <path class="comet" d="M 500 -30 L 1000 120" stroke="url(#cometGradient)" stroke-width="1.8" stroke-dasharray="40 300" stroke-dashoffset="0" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="340; -340" dur="5.5s" repeatCount="indefinite" />
  </path>
  <path class="comet" d="M 200 -30 L 700 120" stroke="url(#cometGradient)" stroke-width="1.5" stroke-dasharray="30 250" stroke-dashoffset="0" opacity="0.6">
    <animate attributeName="stroke-dashoffset" values="280; -280" dur="8.0s" begin="2.5s" repeatCount="indefinite" />
  </path>

  <!-- 3D Perspective Cyber Grid -->
  <!-- Grid Lines (Radiating) -->
  <g stroke="#7c3aed" stroke-width="0.8" opacity="0.10">
    <line x1="575" y1="-80" x2="-335" y2="160" />
    <line x1="575" y1="-80" x2="-175" y2="160" />
    <line x1="575" y1="-80" x2="-25" y2="160" />
    <line x1="575" y1="-80" x2="115" y2="160" />
    <line x1="575" y1="-80" x2="245" y2="160" />
    <line x1="575" y1="-80" x2="365" y2="160" />
    <line x1="575" y1="-80" x2="475" y2="160" />
    <line x1="575" y1="-80" x2="575" y2="160" />
    <line x1="575" y1="-80" x2="675" y2="160" />
    <line x1="575" y1="-80" x2="785" y2="160" />
    <line x1="575" y1="-80" x2="905" y2="160" />
    <line x1="575" y1="-80" x2="1035" y2="160" />
    <line x1="575" y1="-80" x2="1175" y2="160" />
    <line x1="575" y1="-80" x2="1325" y2="160" />
    <line x1="575" y1="-80" x2="1485" y2="160" />
  </g>
  <!-- Grid Lines (Horizontal) -->
  <g stroke="#0ea5e9" stroke-width="0.8" opacity="0.08">
    <line x1="0" y1="20" x2="1150" y2="20" />
    <line x1="0" y1="38" x2="1150" y2="38" />
    <line x1="0" y1="58" x2="1150" y2="58" />
    <line x1="0" y1="80" x2="1150" y2="80" />
    <line x1="0" y1="104" x2="1150" y2="104" />
    <line x1="0" y1="130" x2="1150" y2="130" />
    <line x1="0" y1="158" x2="1150" y2="158" />
  </g>

  <!-- BRAND LOGO & HUD CONTAINER -->
  <g class="hud-glow">
    <!-- Inner Rotating Dashed Circle -->
    <circle cx="175" cy="80" r="64" fill="none" stroke="#bd93f9" stroke-width="1.2" stroke-dasharray="10 8" opacity="0.45">
      <animateTransform attributeName="transform" type="rotate" from="0 175 80" to="360 175 80" dur="12s" repeatCount="indefinite" />
    </circle>
    <!-- Outer Rotating Ring with custom intervals -->
    <circle cx="175" cy="80" r="76" fill="none" stroke="#0ea5e9" stroke-width="1.0" stroke-dasharray="60 30 15 30" opacity="0.35">
      <animateTransform attributeName="transform" type="rotate" from="360 175 80" to="0 175 80" dur="18s" repeatCount="indefinite" />
    </circle>
    <!-- Rotating Node Particles -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 175 80" to="360 175 80" dur="8s" repeatCount="indefinite" />
      <circle cx="175" cy="2" r="3.0" fill="#059669" filter="url(#glow)" />
      <circle cx="175" cy="158" r="2.2" fill="#7c3aed" filter="url(#glow)" />
    </g>
  </g>

  <!-- Custom MYSTIC logo center-aligned inside HUD -->
  <!-- ViewBox of logo is cropped slightly to center properly -->
  <svg x="120" y="25" width="110" height="110" viewBox="48 45 348 348" overflow="visible">
    <g class="logo-pulse">
      <!-- Path 1 (Top Left) -->
      <path d="M0 0 C16.30379229 -0.50333855 31.60170485 3.38883025 44.28515625 13.97265625 C57.43323646 26.681654 63.15194627 43.86639153 63.69495118 61.85944152 C63.76236896 66.04063096 63.75993712 70.22025454 63.74829102 74.40185547 C63.75404736 76.28779532 63.76113574 78.17373151 63.7694397 80.05966187 C63.7844479 84.09131153 63.79033615 88.12282967 63.78891182 92.15450668 C63.78686127 98.54538945 63.80655794 104.93609811 63.8290863 111.32693481 C63.86990816 123.74521144 63.88862362 136.16347386 63.90525818 148.58180237 C63.92766654 164.38067519 63.96142035 180.17950695 64.01245731 195.97831357 C64.03223104 202.3151949 64.04194899 208.65198421 64.04340947 214.98889518 C64.04618417 218.9492359 64.05706681 222.90952677 64.06991959 226.86984634 C64.07415367 228.68812848 64.07509066 230.5064222 64.07224464 232.32470703 C64.04389984 252.80260649 64.1306755 276.01957925 78.96875 291.89453125 C87.43182752 299.79079757 97.22669347 301.04659476 108.34765625 302.16015625 C104.09822409 305.99063031 99.63398869 308.01760527 94.41015625 310.16015625 C93.56694824 310.50900879 92.72374023 310.85786133 91.85498047 311.21728516 C69.11656114 320.44465737 45.53064241 323.80915901 22.03515625 315.41015625 C10.09304277 310.28368977 0.25293894 299.61647703 -5.140625 287.9375 C-9.85393848 276.04993945 -11.80914017 264.48901597 -11.79037476 251.74461365 C-11.79319604 250.94783661 -11.79601732 250.15105958 -11.79892409 249.33013779 C-11.80719054 246.68679719 -11.80860146 244.0434989 -11.81005859 241.40014648 C-11.81473278 239.49376815 -11.81987733 237.58739092 -11.82545471 235.68101501 C-11.8366961 231.58708744 -11.84514936 227.49316697 -11.85157394 223.39922905 C-11.86230432 216.91253366 -11.88256325 210.4258895 -11.9046936 203.93922424 C-11.96644633 185.49718582 -12.02056233 167.05515081 -12.05371094 148.61303711 C-12.07211455 138.41864087 -12.10112113 128.22433102 -12.14171565 118.02999836 C-12.16268748 112.64502733 -12.17822893 107.26016468 -12.18052292 101.87515068 C-12.1826862 96.80330945 -12.19872507 91.73169393 -12.22491264 86.65992165 C-12.23204321 84.81059391 -12.23423739 82.96123864 -12.23081017 81.11190033 C-12.20182889 62.4822101 -13.58062899 43.12560696 -26.30859375 28.35546875 C-34.68887187 20.50594158 -44.66938321 19.03039083 -55.65234375 18.16015625 C-52.90260577 14.73339945 -49.089805 13.38159126 -45.15234375 11.72265625 C-44.43256348 11.41553711 -43.7127832 11.10841797 -42.97119141 10.79199219 C-40.86959149 9.90290793 -38.76273751 9.02813239 -36.65234375 8.16015625 C-35.65976563 7.75152344 -34.6671875 7.34289062 -33.64453125 6.921875 C-22.86249649 2.7538944 -11.50328192 0.69460171 0 0 Z" fill="#ffffff" transform="translate(193.65234375,61.83984375)"/>
      <!-- Path 2 (Right Side) -->
      <path d="M0 0 C13.27608507 10.76781709 19.45169071 27.08332912 21.32194519 43.66020203 C22.00463219 50.70981324 21.96107537 57.76810528 21.97387695 64.84301758 C21.98015486 66.38003183 21.9868028 67.9170446 21.99378967 69.45405579 C22.01466542 74.46675594 22.02517289 79.47945584 22.03515625 84.4921875 C22.03920924 86.22728681 22.04332632 87.96238596 22.04750633 89.69748497 C22.06651759 97.84907512 22.08076001 106.00065641 22.0891183 114.15226442 C22.09889159 123.52543454 22.12523065 132.8983686 22.16561919 142.27145559 C22.19586631 149.54313973 22.21059508 156.81475647 22.21389931 164.08650225 C22.21623884 168.41789612 22.2250562 172.74903658 22.25036049 177.08036232 C22.27379939 181.15745138 22.27781169 185.23412291 22.26759911 189.31126213 C22.26710755 190.7974398 22.2733142 192.2836392 22.28715515 193.7697525 C22.41262328 208.05362091 20.09914242 219.87970812 9.94921875 230.30859375 C1.27462228 238.48306438 -7.85486192 240.79658862 -19.52734375 240.6875 C-29.41656301 239.94134212 -37.35168125 235.50019559 -44.109375 228.41015625 C-52.49046908 218.46648531 -53.79732669 208.22316999 -53.71728516 195.56982422 C-53.72275791 194.10811122 -53.73000625 192.64640397 -53.73887634 191.18470764 C-53.75412237 188.05708905 -53.75705328 184.92979804 -53.75011063 181.80215073 C-53.7392369 176.8397438 -53.75681128 171.87767289 -53.77792358 166.91531372 C-53.80810415 159.05232212 -53.81986966 151.1894313 -53.82350004 143.32638657 C-53.83014992 129.2796264 -53.85953773 115.23293815 -53.9085964 101.1862632 C-53.92492711 96.27105551 -53.93054391 91.3559944 -53.92700601 86.44076228 C-53.92656331 83.35994418 -53.93421634 80.2791796 -53.94368172 77.19837761 C-53.94632339 75.78968589 -53.9456847 74.38098273 -53.94117165 72.97229576 C-53.91855772 65.37708605 -54.24000022 57.90878362 -55.10971069 50.3677063 C-55.18929099 49.67527136 -55.26887128 48.98283642 -55.3508631 48.2694186 C-57.06572221 34.62300929 -62.04251186 21.0932059 -73.203125 12.41015625 C-80.62982713 7.49497372 -89.57637793 7.21461365 -98.203125 6.41015625 C-95.54403076 3.23080444 -92.14544162 1.72323373 -88.453125 0.03515625 C-87.78990234 -0.26938477 -87.12667969 -0.57392578 -86.44335938 -0.88769531 C-59.1223051 -13.15508087 -25.7811239 -18.60446352 0 0 Z" fill="#ffffff" transform="translate(373.203125,107.58984375)"/>
      <!-- Path 3 (Left Side) -->
      <path d="M0 0 C8.04244656 5.91215565 13.88913469 14.14973506 15.86051369 24.05943489 C16.31921896 27.35292948 16.44292195 30.47869108 16.45053101 33.802948 C16.45598434 35.0922673 16.46143768 36.38158661 16.46705627 37.7099762 C16.4681759 39.12680049 16.46922645 40.54362483 16.47021484 41.96044922 C16.47488771 43.46244962 16.48003205 44.96444861 16.48561096 46.46644592 C16.49686513 49.69609315 16.50531251 52.9257313 16.51173019 56.15539169 C16.52245576 61.27665336 16.54271559 66.39785001 16.56484985 71.51907349 C16.62661164 86.08071894 16.68065365 100.64236093 16.71386719 115.20410156 C16.73230013 123.25052589 16.76134704 131.29684138 16.8018719 139.34318554 C16.82280405 143.59249444 16.83837931 147.84166698 16.84067917 152.09103012 C16.84285052 156.0983105 16.85896848 160.10530747 16.88506889 164.11250114 C16.89217089 165.56997164 16.89440808 167.02747682 16.89096642 168.48496056 C16.85620295 186.03066266 19.10051106 204.3369037 30.96875 218.109375 C39.34902812 225.95890217 49.32953946 227.43445292 60.3125 228.3046875 C60.3125 228.9646875 60.3125 229.6246875 60.3125 230.3046875 C33.55521414 243.0639295 5.56708233 252.13214452 -23.6875 242.3046875 C-36.42868909 237.7784469 -46.02942194 227.80078191 -52.06640625 215.9375 C-56.6055431 205.76545838 -58.79542591 195.31600713 -58.83467102 184.19696045 C-58.83834771 183.51678746 -58.8420244 182.83661446 -58.8458125 182.13583016 C-58.85675318 179.87537627 -58.86067662 177.61496848 -58.86450195 175.35449219 C-58.87077376 173.72600665 -58.87742119 172.09752252 -58.88441467 170.46903992 C-58.90536804 165.13822408 -58.91580729 159.80740824 -58.92578125 154.4765625 C-58.92983174 152.63586665 -58.93394875 150.79517095 -58.93813133 148.9544754 C-58.957162 140.30631848 -58.97139877 131.65816999 -58.9797433 123.00999618 C-58.9797433 123.00999618 -59.01584187 103.08879983 -59.05624419 93.12816882 C-59.08645696 85.41326806 -59.10121697 77.69843086 -59.10452431 69.98347211 C-59.10686839 65.3827076 -59.11574535 60.78218111 -59.14098549 56.18148041 C-59.16436263 51.85082464 -59.16846098 47.52056205 -59.15822411 43.18985939 C-59.15773101 41.60770416 -59.16398406 40.02552892 -59.17778015 38.44343376 C-59.28899088 24.92524469 -57.2550017 14.34272207 -47.6875 4.3046875 C-34.63687302 -8.08234828 -15.10501775 -9.52845597 0 0 Z" fill="#ffffff" transform="translate(107.6875,106.6953125)"/>
    </g>
  </svg>

  <!-- TYPOGRAPHY / TEXT CONTAINER -->
  <!-- Left aligned, starting to the right of the logo HUD -->
  <g class="text-glow" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
    <!-- Title "MYSTIC" -->
    <text x="300" y="72" font-size="46" font-weight="900" letter-spacing="10" fill="url(#titleGradient)">MYSTIC</text>
    
    <!-- Tagline -->
    <text x="300" y="106" font-size="20" font-weight="600" fill="#e2d8ff" letter-spacing="0.5">Exploring systems beyond the surface.</text>
    
    <!-- Badges / Bullet point categories -->
    <text x="300" y="132" font-size="12.5" font-weight="800" fill="#0ea5e9" letter-spacing="2.5">
      DEVELOPMENT  •  SECURITY  •  AUTOMATION  •  INFRASTRUCTURE
    </text>
  </g>

  <!-- LIQUID WAVE DIVIDER & TRANSITION -->
  <!-- Wave 1 (Deepest/Back - Slow Purple Wave) -->
  <path d="M 0 150 Q 125 138 250 150 T 500 150 Q 625 138 750 150 T 1000 150 Q 1125 138 1250 150 T 1500 150 Q 1625 138 1750 150 T 2000 150 L 2000 250 L 0 250 Z" fill="#7c3aed" opacity="0.15">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-500 0" dur="18s" repeatCount="indefinite" />
  </path>

  <!-- Wave 2 (Middle - Medium Cyan Wave moving right) -->
  <path d="M 0 150 Q 150 134 300 150 T 600 150 Q 750 134 900 150 T 1200 150 Q 1350 134 1500 150 T 1800 150 L 1800 250 L 0 250 Z" fill="#0ea5e9" opacity="0.22">
    <animateTransform attributeName="transform" type="translate" from="-600 0" to="0 0" dur="13s" repeatCount="indefinite" />
  </path>

  <!-- Wave 3 (Front - Fast Neon Border and Alpha-Fade Fill) -->
  <path d="M 0 150 Q 175 130 350 150 T 700 150 Q 875 130 1050 150 T 1400 150 Q 1575 130 1750 150 T 2100 150 L 2100 250 L 0 250 Z" fill="url(#frontWaveFill)" stroke="url(#borderGradient)" stroke-width="2.2">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-700 0" dur="7.5s" repeatCount="indefinite" />
  </path>
</svg>
